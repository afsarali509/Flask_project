{% extends "base.html" %}

{% block title %}Submit Data{% endblock %}

{% block content %}
<h1>Submit Data</h1>
<p class="subtitle">Form data is saved to MongoDB Atlas.</p>

{% if error %}
<div class="alert alert-error" role="alert">
    <strong>Error:</strong> {{ error }}
</div>
{% endif %}

<form method="POST" action="{{ url_for('index') }}">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required placeholder="Your name">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required placeholder="you@example.com">

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="4" placeholder="Optional message"></textarea>

    <button type="submit">Submit</button>
</form>

<p class="hint">
    <a href="{{ url_for('api') }}" target="_blank">View /api JSON</a>
</p>
{% endblock %}
